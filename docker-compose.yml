version: '3.9'

# =============================================================
# GTW Platform — Docker Swarm Stack
# Imagens buildadas localmente no servidor com build.sh
# Deploy via Portainer — domínio: app.gtw.digital
# =============================================================

networks:
  network_public:
    external: true
  gtw_internal:
    driver: overlay
    internal: true   # Postgres e MinIO não ficam expostos diretamente

volumes:
  gtw_pgdata:
    driver: local
  gtw_uploads:
    driver: local
  gtw_minio:
    driver: local

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  gtw-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       gtw_platform
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - gtw_pgdata:/var/lib/postgresql/data
    networks:
      - gtw_internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 10s
      resources:
        limits:
          memory: 512M

  # ── MinIO Object Storage ────────────────────────────────────
  gtw-minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - gtw_minio:/data
    networks:
      - network_public
      - gtw_internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 10s
      resources:
        limits:
          memory: 256M
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"

        # Arquivos públicos — GET /files/{bucket}/{key}
        - "traefik.http.routers.gtw-minio.rule=Host(`${DOMAIN}`) && PathPrefix(`/files`)"
        - "traefik.http.routers.gtw-minio.entrypoints=websecure"
        - "traefik.http.routers.gtw-minio.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.gtw-minio.priority=25"
        - "traefik.http.routers.gtw-minio.middlewares=minio-strip"
        - "traefik.http.routers.gtw-minio.service=gtw-minio"
        - "traefik.http.services.gtw-minio.loadbalancer.server.port=9000"
        - "traefik.http.middlewares.minio-strip.stripprefix.prefixes=/files"

  # ── Backend ────────────────────────────────────────────────
  gtw-backend:
    image: gtw-backend:latest
    environment:
      NODE_ENV:     production
      PORT:         "4000"
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@gtw-postgres:5432/gtw_platform
      JWT_SECRET:   ${JWT_SECRET}
      FRONTEND_URL: https://${DOMAIN}
      BACKEND_URL:  https://${DOMAIN}
      UPLOAD_DIR:   /app/uploads
      # MinIO / S3 storage
      STORAGE_ENDPOINT:   http://gtw-minio:9000
      STORAGE_PUBLIC_URL: https://${DOMAIN}/files
      STORAGE_ACCESS_KEY: ${MINIO_USER}
      STORAGE_SECRET_KEY: ${MINIO_PASSWORD}
      STORAGE_BUCKET:     gtw-media
    volumes:
      - gtw_uploads:/app/uploads
    networks:
      - network_public
      - gtw_internal
    depends_on:
      - gtw-postgres
      - gtw-minio
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"

        # Rota API REST
        - "traefik.http.routers.gtw-api.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)"
        - "traefik.http.routers.gtw-api.entrypoints=websecure"
        - "traefik.http.routers.gtw-api.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.gtw-api.priority=20"
        - "traefik.http.routers.gtw-api.service=gtw-api"
        - "traefik.http.services.gtw-api.loadbalancer.server.port=4000"

        # Rota uploads legados (fallback para arquivos antigos em disco)
        - "traefik.http.routers.gtw-uploads.rule=Host(`${DOMAIN}`) && PathPrefix(`/uploads`)"
        - "traefik.http.routers.gtw-uploads.entrypoints=websecure"
        - "traefik.http.routers.gtw-uploads.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.gtw-uploads.priority=10"
        - "traefik.http.routers.gtw-uploads.service=gtw-api"

        # Rota Socket.io (WebSocket) — sticky session obrigatória
        - "traefik.http.routers.gtw-ws.rule=Host(`${DOMAIN}`) && PathPrefix(`/socket.io`)"
        - "traefik.http.routers.gtw-ws.entrypoints=websecure"
        - "traefik.http.routers.gtw-ws.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.gtw-ws.priority=15"
        - "traefik.http.routers.gtw-ws.service=gtw-ws"
        - "traefik.http.services.gtw-ws.loadbalancer.server.port=4000"
        - "traefik.http.services.gtw-ws.loadbalancer.sticky.cookie=true"
        - "traefik.http.services.gtw-ws.loadbalancer.sticky.cookie.name=gtw_ws_sticky"

  # ── Frontend ───────────────────────────────────────────────
  gtw-frontend:
    image: gtw-frontend:latest
    environment:
      NODE_ENV:            production
      NEXT_PUBLIC_API_URL: "https://${DOMAIN}/api/v1"
    networks:
      - network_public
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"
        - "traefik.http.routers.gtw-frontend.rule=Host(`${DOMAIN}`)"
        - "traefik.http.routers.gtw-frontend.entrypoints=websecure"
        - "traefik.http.routers.gtw-frontend.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.gtw-frontend.priority=1"
        - "traefik.http.services.gtw-frontend.loadbalancer.server.port=3000"
